<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World College of Medical Sciences & Research</title>
    <script>
      (function() {
        try {
          let currentFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return currentFetch;
            },
            set(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            let currentFetch = window.fetch;
            Object.defineProperty(Window.prototype, 'fetch', {
              get() {
                return currentFetch;
              },
              set(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          } catch (err) {
            try {
              let currentFetch = window.fetch;
              Object.defineProperty(globalThis, 'fetch', {
                get() {
                  return currentFetch;
                },
                set(val) {
                  currentFetch = val;
                },
                configurable: true,
                enumerable: true
              });
            } catch (err2) {
              console.warn("Could not patch fetch setter:", err2);
            }
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
